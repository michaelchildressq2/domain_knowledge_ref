relationship_labels:
  - depends-on
  - enables
  - conflicts-with
  - alternative-to
  - strengthens
  - overlaps-with

source_confidence:
  high: source is authoritative, directly relevant, and available to the reviewer.
  medium: pattern is synthesized from multiple sources or public metadata plus general engineering practice.
  low: plausible inference that needs review before operational use.

reserved_statuses:
  - seed
  - draft
  - reviewed
  - deprecated
