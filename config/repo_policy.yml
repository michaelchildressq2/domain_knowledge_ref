repository_policy:
  raw_source_paths:
    - intake/raw
    - work/extracts
  generated_paths:
    - work/index
    - work/suggestions
  commit_raw_source: false
  max_quote_words_per_pattern: 25
  require_source_lineage: true
  require_subject_folder: true
  require_related_scan: true
  default_reviewers:
    - platform-architecture
    - sre
    - source-curator

pattern_contract:
  required_frontmatter:
    - id
    - title
    - type
    - status
    - subject_area
    - summary
    - tags
    - aliases
    - applies_when
    - avoid_when
    - related
    - sources
    - source_confidence
    - last_reviewed
  required_body_headings:
    - Intent
    - Use when
    - Avoid when
    - Context and problem
    - Forces
    - Guidance
    - Implementation moves
    - Checks
    - Failure modes
    - Agent trigger hints
    - Source notes
